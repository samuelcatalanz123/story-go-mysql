syntax = "proto3";

package auth.v1;

// El go_package indica dónde se genera el código Go.
option go_package = "story-go-mysql/internal/authpb;authpb";

// AuthService es el contrato del microservicio de autenticación. Tanto el
// servidor (cmd/auth) como el cliente (el monolito) generan su código de aquí.
service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc Verify(VerifyRequest) returns (VerifyResponse); // valida un access token
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthResponse {
  string access_token = 1;
  uint64 user_id = 2;
  string email = 3;
}

message VerifyRequest {
  string access_token = 1;
}

message VerifyResponse {
  bool valid = 1;
  uint64 user_id = 2;
}
